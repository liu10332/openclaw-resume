# openclaw-resume 默认配置

# GitHub 配置
github:
  # 从环境变量读取，不在这里硬编码
  # OPENCLAW_RESUME_USER - GitHub 用户名
  # OPENCLAW_RESUME_PAT  - Personal Access Token
  default_branch: "main"

# 同步配置
sync:
  interval_seconds: 900           # 15分钟
  max_retries: 3
  retry_delay_seconds: 30

# 路径配置
paths:
  state_base: "$HOME/.openclaw-resume"
  workspace_target: "$HOME/workspace"

# 检查点配置
checkpoints:
  max_pending: 5                  # 最多保留5个未确认检查点
  auto_cleanup_days: 30           # 30天前的自动清理

# 环境捕获配置
environment:
  capture_python: true
  capture_node: true
  capture_system: true
  capture_env_vars: ["PATH", "PYTHONPATH", "LANG", "LC_ALL", "NODE_PATH"]
