# ========================================
# openclaw-resume 进度追踪文件
# 每次同步自动更新
# ========================================

# 会话信息
session:
  id: ""                           # 自动生成: YYYY-MM-DD-am/pm-N
  started: ""                      # ISO 8601 时间
  expires_at: ""                   # 开始时间 + 1小时
  last_saved: ""                   # ISO 8601 时间（定时器更新）

# 当前位置（LLM随手更新，不强制格式）
position:
  project: ""
  project_desc: ""
  task: ""                         # 当前任务描述
  step: "0"                        # 当前步骤
  total_steps: "0"                 # 总步骤数
  note: ""                         # 自由文本，LLM一句带过

# 关键节点记录（脚本触发，LLM写一句话）
# 触发条件：文件有变化、测试结果、安装依赖、用户决策
# 跳过条件：无变化的连续操作
# 1小时约 6-12 条
log: []

# 检查点列表（只保留已确认的）
checkpoints: []

# 待办事项
todo: []
